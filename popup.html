<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>easyapply Config</title>
  <style>
    body {
      width: 300px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #1e1e23;
      color: #fff;
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(90deg, #A18CD1 0%, #FBC2EB 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      color: #aaa;
    }
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #2a2a30;
      color: #fff;
      font-size: 13px;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #A18CD1;
    }
    .toggle-container {
      display: flex;
      align-items: center;
      margin-top: 16px;
      margin-bottom: 16px;
    }
    .toggle-container input {
      margin-right: 8px;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(90deg, #A18CD1 0%, #FBC2EB 100%);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    #statusMessage {
      margin-top: 10px;
      font-size: 12px;
      color: #4CAF50;
      text-align: center;
      min-height: 15px;
    }
  </style>
</head>
<body>
  <h2>⚡ easyapply</h2>
  <div class="toggle-container">
    <input type="checkbox" id="autopilotToggle">
    <label for="autopilotToggle" style="margin-bottom:0; font-size:14px; color:#fff;">Enable Autopilot on LinkedIn</label>
  </div>
  
  <div class="form-group">
    <label for="firstName">First Name</label>
    <input type="text" id="firstName" placeholder="John">
  </div>
  <div class="form-group">
    <label for="lastName">Last Name</label>
    <input type="text" id="lastName" placeholder="Doe">
  </div>
  <div class="form-group">
    <label for="phone">Phone Number</label>
    <input type="text" id="phone" placeholder="1234567890">
  </div>

  <button id="saveBtn">Save Configuration</button>
  <div id="statusMessage"></div>

  <script src="popup.js"></script>
</body>
</html>
