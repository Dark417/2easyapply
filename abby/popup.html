<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Abby</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      height: 595px;
      max-height: 595px;
      display: flex;
      flex-direction: column;
      font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
      background: #14141e;
      color: #e0e0f0;
      font-size: 14px;
      overflow: hidden;
    }

    .header {
      padding: 12px 14px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .logo {
      font-size: 21px;
    }

    .title {
      font-size: 17px;
      font-weight: 700;
      background: linear-gradient(90deg, #A18CD1 0%, #FBC2EB 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      flex: 1;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .menu-version {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.35px;
      color: #a9b5da;
      -webkit-text-fill-color: #a9b5da;
    }

    .btn,
    .search-btn {
      border-radius: 8px;
      font-family: inherit;
      cursor: pointer;
    }

    .toggle-stack,
    .stats,
    .search-summary,
    .search-controls,
    .footer {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
    }

    .toggle-stack {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .toggle-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .toggle-label {
      flex: 1;
    }

    .toggle-cell {
      width: 88px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .toggle-cell-label {
      font-size: 11px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: 0.3px;
      color: #d6ddf7;
      text-align: center;
    }

    .toggle-cell-value {
      font-size: 11px;
      color: #9da8cc;
      text-align: center;
      margin-top: -4px;
    }

    .theme-icon {
      font-size: 14px;
      color: #ffd978;
      line-height: 1;
      margin-right: 6px;
      user-select: none;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 42px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked+.slider {
      background: linear-gradient(90deg, #A18CD1, #FBC2EB);
    }

    input:checked+.slider::before {
      transform: translateX(18px);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 8px 6px;
      text-align: center;
    }

    .stat-value {
      font-size: 17px;
      font-weight: 700;
      color: #c5aef5;
    }

    .stat-label {
      margin-top: 4px;
      font-size: 11px;
      color: #8f8fa8;
    }

    .search-summary .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8f8fa8;
    }

    .search-summary .value {
      margin-top: 5px;
      font-weight: 600;
      line-height: 1.25;
      color: #f3f0ff;
      font-size: 13px;
    }

    .search-controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .search-row {
      display: flex;
      gap: 6px;
    }

    .search-input,
    .search-select {
      width: 100%;
      min-height: 32px;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid rgba(214, 223, 255, 0.22);
      background: rgba(12, 14, 22, 0.82);
      color: #f6f8ff;
      font-size: 12.5px;
    }

    .search-input::placeholder {
      color: #9ea6c7;
    }

    .search-list {
      max-height: 116px;
      overflow-y: auto;
      border-radius: 8px;
      border: 1px solid rgba(214, 223, 255, 0.22);
      background: rgba(12, 14, 22, 0.82);
    }
    
    .sl-item {
      display: flex;
      padding: 5px 8px;
      font-size: 12.5px;
      color: #f6f8ff;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
    }
    
    .sl-item:hover { background: rgba(255, 255, 255, 0.1); }
    .sl-item.selected { background: rgba(161, 140, 209, 0.2); }
    .sl-text { flex: 1; pointer-events: none; }
    .sl-del { display: none; color: #ff6060; cursor: pointer; font-weight: bold; padding: 0 4px; }
    .sl-item:hover .sl-del { display: inline-block; }

    .search-btn {
      border: none;
      padding: 7px 11px;
      font-size: 11.5px;
      font-weight: 700;
    }

    .search-btn-save {
      background: rgba(255, 255, 255, 0.08);
      color: #ddd;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .search-btn-run {
      background: linear-gradient(90deg, #A18CD1, #FBC2EB);
      color: #fff;
    }

    .footer {
      display: flex;
      gap: 10px;
      border-bottom: none;
    }

    .btn {
      flex: 1;
      padding: 8px;
      border: none;
      font-size: 12.5px;
      font-weight: 700;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #ddd;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-primary {
      background: linear-gradient(90deg, #A18CD1, #FBC2EB);
      color: #fff;
    }

    body.light-theme {
      background: #f7f7fa;
      color: #111;
    }
    .light-theme .header, .light-theme .toggle-stack, .light-theme .stats, .light-theme .search-summary, .light-theme .search-controls, .light-theme .footer {
      border-color: #ddd;
    }
    .light-theme .stat, .light-theme .search-input, .light-theme .search-list, .light-theme .search-btn-save, .light-theme .btn-secondary {
      background: #fff;
      border-color: #ccc;
      color: #111;
    }
    .light-theme .stat-label, .light-theme .search-summary .label {
      color: #666;
    }
    .light-theme .toggle-cell-label { color: #37304c; }
    .light-theme .toggle-cell-value { color: #5a5670; }
    .light-theme .theme-icon { color: #6d49c6; }
    .light-theme .stat-value { color: #5925dc; }
    .light-theme .search-summary .value { color: #111; }
    .light-theme .sl-item { color: #111; border-color: #eee; }
    .light-theme .sl-item:hover { background: #f0f0f5; }
    .light-theme .sl-item.selected { background: #e8e0ff; }
  </style>
</head>

<body>
  <div class="header">
    <span class="logo">⚡</span>
    <span class="title">Abby <span class="menu-version" id="versionText">v1.1.20</span></span>
    <div class="header-actions">
      <span class="theme-icon" id="themeIcon" aria-hidden="true">🌙</span>
      <label class="switch" title="Dark Theme">
        <input type="checkbox" id="themeToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <div class="toggle-stack">
    <div class="toggle-row">
      <div class="toggle-cell">
        <div class="toggle-cell-label">Enable Abby</div>
        <label class="switch">
          <input type="checkbox" id="autopilotToggle">
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-cell">
        <div class="toggle-cell-label">Apply Mode</div>
        <div class="toggle-cell-value" id="applyModeValue">Auto</div>
        <label class="switch">
          <input type="checkbox" id="applyModeToggle">
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="answers-count">0</div>
      <div class="stat-label">Saved Answers</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="search-count">0</div>
      <div class="stat-label">Locations</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="ignore-count">0</div>
      <div class="stat-label">Ignored</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="auto-count">0</div>
      <div class="stat-label">Auto</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="manual-count">0</div>
      <div class="stat-label">Manual</div>
    </div>
  </div>

  <div class="search-summary" style="padding-top:8px; padding-bottom:8px;">
    <div class="label">Selected Location</div>
    <div class="value" id="selected-search" style="margin-top:4px;">No saved location</div>
  </div>

  <div class="search-controls" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px;">
    <div class="search-row">
      <input class="search-input" id="searchText" type="text" placeholder="California, United States">
      <button class="search-btn search-btn-save" id="saveSearchBtn">Save</button>
    </div>
    <div class="search-list" id="savedSearchList"></div>
    <button class="search-btn search-btn-run" id="runSearchBtn">Search</button>
  </div>

  <div class="footer">
    <button class="btn btn-secondary" id="infoBtn">Settings</button>
    <button class="btn btn-primary" id="searchBtn">Search</button>
  </div>

  <script src="popup.js"></script>
</body>

</html>
